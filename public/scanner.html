<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Scanner – 3D Model Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
        }
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto;
        }
        /* Прогресс‑бар */
        #progress-container {
            position: fixed;
            bottom: 30px;
            left: 16px;
            right: 16px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            z-index: 3;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #4c9aff;
            border-radius: 4px;
            transition: width 0.1s linear;
        }
        .progress-visible {
            opacity: 1 !important;
        }
        /* Кнопка сброса — современный стиль */
        #reset-button {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 22px;
            cursor: pointer;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        #reset-button:hover {
            background: rgba(0,0,0,0.7);
            transform: scale(1.05);
        }
        #reset-button:active {
            transform: scale(0.95);
        }
        /* Плашка описания */
        #info-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0,0,0,0.8);
            backdrop-filter: blur(12px);
            color: #fff;
            padding: 20px 20px 24px 20px;
            border-radius: 28px 28px 0 0;
            z-index: 2;
            pointer-events: auto;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.2);
            transform: translateY(calc(100% - 70px));
            border-top: 1px solid rgba(255,255,255,0.15);
            font-family: inherit;
        }
        #info-panel.expanded {
            transform: translateY(0);
        }
        .panel-handle {
            width: 48px;
            height: 4px;
            background: rgba(255,255,255,0.4);
            border-radius: 2px;
            margin: 0 auto 16px auto;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }
        .panel-controls {
            display: flex;
            gap: 12px;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #info-panel.expanded .panel-controls {
            opacity: 1;
        }
        .ctrl-btn {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
            backdrop-filter: blur(4px);
        }
        .ctrl-btn:active {
            background: rgba(255,255,255,0.3);
        }
        #model-description {
            font-size: 15px;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            padding-right: 8px;
            transition: font-size 0.1s ease;
        }
        /* Стилизация скроллбара */
        #model-description::-webkit-scrollbar {
            width: 4px;
        }
        #model-description::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
            border-radius: 2px;
        }
        #model-description::-webkit-scrollbar-thumb {
            background: rgba(255,255,255,0.3);
            border-radius: 2px;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 600px) {
            #info-panel { padding: 16px 16px 20px; }
            .ctrl-btn { width: 32px; height: 32px; font-size: 16px; }
            #model-description { font-size: 14px; }
        }
    </style>
</head>
<body>
    <video id="video-background" autoplay playsinline muted></video>
    <div id="canvas-container"></div>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    <button id="reset-button" aria-label="Сбросить модель">↻</button>
    <div id="info-panel" class="hidden">
        <div class="panel-handle"></div>
        <div class="panel-header">
            <div></div> <!-- пустой для выравнивания -->
            <div class="panel-controls">
                <button class="ctrl-btn" id="text-speak-btn" title="Озвучить текст">🔊</button>
                <button class="ctrl-btn" id="text-inc-btn" title="Увеличить шрифт">A+</button>
                <button class="ctrl-btn" id="text-dec-btn" title="Уменьшить шрифт">A-</button>
            </div>
        </div>
        <p id="model-description"></p>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
