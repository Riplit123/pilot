<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Scanner – 3D Model Viewer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto;
        }
        #info-panel {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 12px 20px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            z-index: 2;
            font-size: 14px;
            pointer-events: none;
            text-align: center;
            transition: opacity 0.3s;
        }
        #info-panel h3 {
            margin: 0 0 5px 0;
            font-size: 18px;
        }
        #info-panel p {
            margin: 0;
            word-break: break-word;
        }
        #scan-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 3;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-size: 18px;
            text-align: center;
            backdrop-filter: blur(4px);
            pointer-events: none;
            transition: opacity 0.5s;
        }
        .hidden {
            display: none;
        }
        #status {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(0,0,0,0.6);
            color: lime;
            padding: 8px 16px;
            border-radius: 20px;
            font-family: monospace;
            z-index: 2;
            font-size: 12px;
            pointer-events: none;
            max-width: 80%;
        }
        .error-status {
            color: #ff8888;
        }
        @media (max-width: 600px) {
            #info-panel { font-size: 12px; padding: 8px 16px; }
            #info-panel h3 { font-size: 16px; }
        }
    </style>
</head>
<body>
    <video id="video-background" autoplay playsinline muted></video>
    <div id="canvas-container"></div>
    <div id="info-panel" class="hidden">
        <h3 id="model-title">3D Модель</h3>
        <p id="model-description"></p>
    </div>
    <div id="scan-overlay">
        📱 Наведите камеру на QR-код<br>для загрузки модели
    </div>
    <div id="status">⏳ Инициализация камеры...</div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
