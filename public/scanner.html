<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Scanner – 3D Model Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
        }
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto;
        }
        /* Прогресс‑бар */
        #progress-container {
            position: fixed;
            bottom: 30px;
            left: 16px;
            right: 16px;
            height: 4px;
            background: rgba(255,255,255,0.2);
            border-radius: 4px;
            z-index: 3;
            opacity: 0;
            transition: opacity 0.2s;
            pointer-events: none;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #4c9aff;
            border-radius: 4px;
            transition: width 0.1s linear;
        }
        .progress-visible {
            opacity: 1 !important;
        }
        /* Кнопка сброса */
        #reset-button {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.3);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.2s, background 0.2s;
            user-select: none;
        }
        #reset-button:active {
            transform: scale(0.95);
            background: rgba(0,0,0,0.8);
        }
        /* Плашка описания */
        #info-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.85);
            color: #fff;
            padding: 16px 20px;
            border-radius: 24px 24px 0 0;
            z-index: 2;
            font-size: 15px;
            pointer-events: auto;
            text-align: left;
            transition: transform 0.5s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform: translateY(calc(100% - 60px));
            border-top: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            backdrop-filter: blur(8px);
        }
        #info-panel.expanded {
            transform: translateY(0);
        }
        .panel-handle {
            width: 40px;
            height: 4px;
            background: rgba(255,255,255,0.5);
            border-radius: 2px;
            margin: 0 auto 12px auto;
        }
        #info-panel p {
            margin: 0;
            font-size: 14px;
            line-height: 1.4;
            max-height: 200px;
            overflow-y: auto;
        }
        #info-panel:not(.expanded) p {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 600px) {
            #info-panel { padding: 12px 16px; }
            .panel-handle { margin-bottom: 8px; }
            #reset-button { top: 16px; right: 16px; width: 44px; height: 44px; font-size: 22px; }
        }
    </style>
</head>
<body>
    <video id="video-background" autoplay playsinline muted></video>
    <div id="canvas-container"></div>
    <div id="progress-container">
        <div id="progress-bar"></div>
    </div>
    <button id="reset-button" aria-label="Сбросить модель">↻</button>
    <div id="info-panel" class="hidden">
        <div class="panel-handle"></div>
        <p id="model-description"></p>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
