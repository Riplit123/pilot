<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Scanner – 3D Model Viewer</title>
    <link rel="stylesheet" href="style.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
        }
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto;
        }
        /* Минималистичная плашка описания */
        #info-panel {
            position: fixed;
            bottom: 80px;
            left: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.65);
            backdrop-filter: none;
            color: #fff;
            padding: 14px 20px;
            border-radius: 24px;
            z-index: 2;
            font-size: 15px;
            pointer-events: none;
            text-align: left;
            transition: opacity 0.25s ease;
            border: 1px solid rgba(255,255,255,0.2);
            font-weight: 400;
            letter-spacing: -0.2px;
            line-height: 1.4;
        }
        #info-panel h3 {
            font-size: 18px;
            font-weight: 500;
            margin: 0 0 4px 0;
            letter-spacing: -0.3px;
        }
        #info-panel p {
            margin: 0;
            font-size: 14px;
            opacity: 0.85;
        }
        .hidden {
            display: none;
        }
        /* Стильный статус-бар внизу */
        #status-bar {
            position: fixed;
            bottom: 20px;
            left: 16px;
            right: 16px;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: none;
            border-radius: 40px;
            padding: 10px 20px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            z-index: 2;
            text-align: center;
            pointer-events: none;
            border: 1px solid rgba(255,255,255,0.2);
            transition: all 0.2s ease;
            font-family: inherit;
        }
        #status-text {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .status-icon {
            font-size: 18px;
        }
        .error-status {
            background: rgba(220, 53, 69, 0.9);
            border-color: rgba(255,255,255,0.3);
        }
        /* Анимация сканирования (опционально) */
        @keyframes pulse {
            0% { opacity: 0.6; transform: scale(1); }
            100% { opacity: 1; transform: scale(1.02); }
        }
        .scanning-active {
            animation: pulse 1.2s infinite;
        }
        @media (max-width: 600px) {
            #info-panel { bottom: 80px; padding: 12px 16px; }
            #info-panel h3 { font-size: 16px; }
            #status-bar { bottom: 16px; padding: 8px 16px; font-size: 13px; }
        }
    </style>
</head>
<body>
    <video id="video-background" autoplay playsinline muted></video>
    <div id="canvas-container"></div>
    <div id="info-panel" class="hidden">
        <h3 id="model-title">3D Модель</h3>
        <p id="model-description"></p>
    </div>
    <div id="status-bar">
        <div id="status-text">
            <span class="status-icon">📷</span>
            <span id="status-message">Инициализация камеры...</span>
        </div>
    </div>

    <!-- Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
