<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent; /* убирает синий фон при тапе на мобильных */
        }
        body {
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #000;
        }
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto;
        }

        /* Верхняя панель с кнопкой сброса и прогресс-баром */
        #top-bar {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 4;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 12px;
        }
        /* Кнопка сброса */
        #reset-button {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            outline: none;
            user-select: none;
        }
        #reset-button:active {
            transform: scale(0.94);
            background: rgba(0,0,0,0.7);
        }
        #reset-button:focus-visible {
            outline: 2px solid #4c9aff;
        }

        /* Прогресс-бар (вертикальный? лучше горизонтальный, но вверху справа) */
        #progress-container {
            width: 120px;
            height: 3px;
            background: rgba(255,255,255,0.2);
            border-radius: 3px;
            overflow: hidden;
            opacity: 0;
            transition: opacity 0.2s;
        }
        #progress-bar {
            height: 100%;
            width: 0%;
            background: #4c9aff;
            border-radius: 3px;
            transition: width 0.1s linear;
        }
        .progress-visible {
            opacity: 1;
        }

        /* Панель описания (снизу) */
        #info-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(20px);
            color: white;
            padding: 18px 24px;
            border-radius: 32px 32px 0 0;
            z-index: 2;
            pointer-events: auto;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform: translateY(calc(100% - 70px));
            border-top: 1px solid rgba(255,255,255,0.2);
            cursor: grab;
        }
        #info-panel.expanded {
            transform: translateY(0);
            cursor: default;
        }
        .panel-handle {
            width: 48px;
            height: 4px;
            background: rgba(255,255,255,0.4);
            border-radius: 2px;
            margin: 0 auto 16px auto;
            cursor: grab;
        }

        /* Контейнер для кнопок управления (над плашкой) */
        .panel-controls {
            position: absolute;
            top: -52px;
            right: 16px;
            display: flex;
            gap: 12px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(12px);
            padding: 8px 12px;
            border-radius: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            pointer-events: auto;
            z-index: 3;
        }
        .panel-controls button {
            background: rgba(255,255,255,0.15);
            border: none;
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            font-size: 20px;
            cursor: pointer;
            transition: 0.2s;
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            outline: none;
            user-select: none;
        }
        .panel-controls button:active {
            transform: scale(0.92);
            background: rgba(255,255,255,0.25);
        }
        .panel-controls button:focus-visible {
            outline: 2px solid #4c9aff;
        }

        /* Текст описания */
        #description-text {
            font-size: 15px;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            transition: font-size 0.2s;
            padding-right: 8px;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            font-weight: 400;
            letter-spacing: -0.2px;
        }
        #info-panel:not(.expanded) #description-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-height: none;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 600px) {
            #info-panel { padding: 14px 20px; }
            .panel-handle { margin-bottom: 12px; }
            .panel-controls { top: -48px; right: 12px; gap: 8px; padding: 6px 10px; }
            .panel-controls button { width: 32px; height: 32px; font-size: 18px; }
            #top-bar { top: 16px; right: 16px; gap: 8px; }
            #reset-button { width: 44px; height: 44px; font-size: 22px; }
            #progress-container { width: 100px; }
        }
    </style>
</head>
<body>
    <video id="video-background" autoplay playsinline muted></video>
    <div id="canvas-container"></div>
    
    <div id="top-bar">
        <div id="progress-container">
            <div id="progress-bar"></div>
        </div>
        <button id="reset-button">↻</button>
    </div>

    <div id="info-panel" class="hidden">
        <div class="panel-handle"></div>
        <!-- Кнопки вынесены над плашкой -->
        <div class="panel-controls">
            <button id="audio-btn">🔊</button>
            <button id="zoom-out">−</button>
            <button id="zoom-in">+</button>
        </div>
        <div id="description-text"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
