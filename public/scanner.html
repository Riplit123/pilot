<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>AR Viewer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            overflow: hidden;
            font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: #000;
        }
        #video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
        }
        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            pointer-events: auto;
        }
        /* Кнопка сброса */
        #reset-button {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 24px;
            cursor: pointer;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s ease;
            outline: none;
        }
        #reset-button:active {
            transform: scale(0.94);
            background: rgba(0,0,0,0.7);
        }
        /* Спиннер с процентами */
        .spinner-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.7);
            backdrop-filter: blur(8px);
            z-index: 10;
            display: flex;
            align-items: center;
            justify-content: center;
            visibility: hidden;
            opacity: 0;
            transition: visibility 0s, opacity 0.2s;
        }
        .spinner-overlay.active {
            visibility: visible;
            opacity: 1;
        }
        .spinner-container {
            text-align: center;
        }
        .spinner {
            width: 60px;
            height: 60px;
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid #4c9aff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .loading-percent {
            color: white;
            font-size: 24px;
            font-weight: 500;
            letter-spacing: 1px;
        }
        /* Плашка описания с кнопками внутри (над текстом) */
        #info-panel {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(20, 20, 30, 0.85);
            backdrop-filter: blur(20px);
            color: white;
            padding: 18px 24px;
            border-radius: 32px 32px 0 0;
            z-index: 2;
            pointer-events: auto;
            transition: transform 0.4s cubic-bezier(0.2, 0.9, 0.4, 1.1);
            transform: translateY(calc(100% - 70px));
            border-top: 1px solid rgba(255,255,255,0.2);
            cursor: grab;
        }
        #info-panel.expanded {
            transform: translateY(0);
            cursor: default;
        }
        .panel-handle {
            width: 48px;
            height: 4px;
            background: rgba(255,255,255,0.4);
            border-radius: 2px;
            margin: 0 auto 16px auto;
            cursor: grab;
        }
        /* Блок с кнопками (внутри плашки, но над текстом) */
        .panel-controls {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-bottom: 12px;
            margin-top: -10px; /* негативный отступ, чтобы кнопки были выше */
        }
        .control-btn {
            width: 48px;
            height: 48px;
            border-radius: 30px;
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            font-size: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.2s;
            outline: none;
        }
        .control-btn:active {
            transform: scale(0.94);
            background: rgba(0,0,0,0.8);
        }
        #description-text {
            font-size: 15px;
            line-height: 1.5;
            max-height: 200px;
            overflow-y: auto;
            transition: font-size 0.2s;
            padding-right: 8px;
            user-select: text;
        }
        #info-panel:not(.expanded) #description-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-height: none;
        }
        .hidden {
            display: none;
        }
        @media (max-width: 600px) {
            .control-btn { width: 44px; height: 44px; font-size: 20px; }
            .panel-controls { gap: 16px; margin-top: -8px; }
            #info-panel { padding: 14px 20px; }
        }
    </style>
</head>
<body>
    <video id="video-background" autoplay playsinline muted></video>
    <div id="canvas-container"></div>
    <button id="reset-button">↻</button>
    <div class="spinner-overlay" id="spinner-overlay">
        <div class="spinner-container">
            <div class="spinner"></div>
            <div class="loading-percent" id="loading-percent">0%</div>
        </div>
    </div>
    <div id="info-panel" class="hidden">
        <div class="panel-handle"></div>
        <div class="panel-controls">
            <button class="control-btn" id="audio-btn">🔊</button>
            <button class="control-btn" id="zoom-out">−</button>
            <button class="control-btn" id="zoom-in">+</button>
        </div>
        <div id="description-text"></div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <script src="scanner.js"></script>
</body>
</html>
